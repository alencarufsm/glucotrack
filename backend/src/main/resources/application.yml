spring:
  datasource:
    url: ${SUPABASE_DB_URL}
    username: postgres
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SUPABASE_URL}/auth/v1/.well-known/jwks.json
          jws-algorithms: ES256

supabase:
  url: ${SUPABASE_URL}

server:
  port: ${PORT:8080}

logging:
  level:
    com.glucotrack: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${SUPABASE_DB_URL}
    username: postgres
    password: ${SUPABASE_DB_PASSWORD}
  jpa:
    show-sql: true
